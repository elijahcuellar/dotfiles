name: Test Setup Script

on:
  push:
    branches: ["main"]
    paths:
      - "**/*.sh"
      - "config/**"
      - ".github/workflows/**"
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  test-fedora:
    name: Fedora E2E Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: fedora:latest
      # Privileged mode is often required for Flatpak and Akmods dbus/systemd interactions in CI
      options: --privileged

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare Container Environment
        run: |
          dnf update -y
          # Install prerequisite utilities missing from minimal Fedora container images
          dnf install -y sudo curl git dnf-plugins-core util-linux shadow-utils tar xz

          # Create a non-root user to properly test script sudo escalations
          useradd -m -s /bin/bash testuser
          echo "testuser ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/testuser
          chmod 0440 /etc/sudoers.d/testuser

          # Assign workspace ownership to the test user
          chown -R testuser:testuser ${{ github.workspace }}

      - name: Execute Provisioning Script
        # Running with --debug ensures verbose logs in GitHub Actions for easier troubleshooting
        run: >
          sudo -i -u testuser bash -c
          "cd ${{ github.workspace }} && ./setup.sh --debug"

      - name: Validate CLI Utilities Installation
        run: |
          sudo -i -u testuser bash -c "
            set -e
            gh --version
            just --version
            starship --version
          "

      - name: Validate Dotfile Configurations
        run: |
          sudo -i -u testuser bash -c "
            set -e
            test -f ~/.config/starship.toml
            test -f ~/.config/zed/settings.json
            grep -q 'starship init bash' ~/.bashrc
          "
