name: CI Pipeline

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - ".github/workflows/update-readme.yml"
      - "header.txt"
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  lint:
    name: Lint Scripts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "."
          ignore_names: "update_readme.sh"

  e2e-test:
    name: E2E Test (Fedora)
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: fedora:latest
      options: --privileged
    defaults:
      run:
        shell: bash

    steps:
      - name: Install Prerequisites
        run: |
          dnf install -y -q \
            --setopt=install_weak_deps=False \
            --setopt=fastestmirror=True \
            git tar xz curl util-linux fontconfig

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Execute Setup Script
        run: bash setup.sh --no-sudo --debug
        env:
          DOTFILES_DIR: ${{ github.workspace }}

      - name: Verify CLI Tools
        run: |
          gh --version
          just --version
          starship --version

      - name: Verify Configurations
        run: |
          test -f ~/.config/starship.toml
          test -f ~/.config/zed/settings.json
          grep -q "starship init bash" ~/.bashrc
