name: Test Setup Script

on:
  push:
    branches: ["main"]
    paths:
      - "**/*.sh"
      - "config/**"
      - ".github/workflows/**"
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  test-fedora:
    name: Fedora E2E Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: fedora:latest
      # Privileged mode is often required for Flatpak and Akmods dbus/systemd interactions in CI
      options: --privileged

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare Container Environment
        run: |
          set -euo pipefail

          # Install prerequisite utilities missing from minimal Fedora container images
          dnf install -y --setopt=install_weak_deps=False --setopt=fastestmirror=True curl git dnf-plugins-core util-linux tar xz

      - name: Execute Provisioning Script
        # Running with --debug ensures verbose logs in GitHub Actions for easier troubleshooting
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          ./setup.sh --debug

      - name: Validate CLI Utilities Installation
        run: |
          set -e
          gh --version
          just --version
          starship --version

      - name: Validate Dotfile Configurations
        run: |
          set -e
          test -f ~/.config/starship.toml
          test -f ~/.config/zed/settings.json
          grep -q 'starship init bash' ~/.bashrc
